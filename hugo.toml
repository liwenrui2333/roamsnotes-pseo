baseURL = "https://www.roamsnotes.com/"
locale = "en-US"
title = "RoamsNotes"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[params]
  description = "Practical guides and tools for choosing online tarot, astrology, and spiritual reading services."
  brand = "RoamsNotes"
  affiliateDisclosure = "RoamsNotes may earn a commission when you buy through some links. We focus on practical comparison and safety, not guaranteed outcomes."
  authorName = "Mira Vale"
  authorTitle = "Spiritual services buyer-guide editor"
  authorBio = "Mira Vale reviews online tarot and astrology services from a buyer-safety angle: clear questions, transparent scope, fixed-price comparison, and practical red flags."
  # --- Tracking (fill to activate; empty = no-op) ---
  ga4Id = "G-60ZZG20MGV"      # e.g. G-XXXXXXXXXX
  clarityId = "vc5g9zs7d6"    # Microsoft Clarity project id
  googleSiteVerification = "" # GSC HTML-tag verification token
  # --- Fiverr affiliate (fill to emit real deep links) ---
  fiverrAffiliateId = "1067909"  # bta id from Fiverr affiliate dashboard (Marketplace New plan)

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  priority = 0.6
