# ---------- B 牌阵（3）：tool=问题生成器，money=fiverr-tarot ----------
- slug: three-card-tarot-spread
  type: spread
  target_kw: "three card tarot spread"
  tool_path: /tools/tarot-question-generator/
  money_path: /fiverr-tarot-reading/
  related: [/tools/tarot-question-generator/, /fiverr-tarot-reading/, /what-to-ask-a-tarot-reader/]
  spread_data:
    spread_name: "Three-Card Spread"
    positions: "1) Past / what set this up — 2) Present / where you are now — 3) Guidance / what you can do, NOT what will happen"
    best_for: "One focused situation you're actively thinking through; quick check-ins"
    common_mistake: "Reading position 3 as a prediction of the outcome instead of as advice you can act on"

- slug: yes-or-no-tarot
  type: spread
  target_kw: "yes or no tarot"
  tool_path: /tools/tarot-question-generator/
  money_path: /fiverr-tarot-reading/
  related: [/tools/tarot-question-generator/, /fiverr-tarot-reading/, /how-to-choose-a-tarot-reader-online/]
  spread_data:
    spread_name: "Yes / No Single Card"
    positions: "1) One card; upright leans yes / reversed leans no — but read the card's meaning as the real answer, not the direction alone"
    best_for: "Low-stakes, genuinely binary questions when you want a quick nudge"
    common_mistake: "Forcing a life-changing or relational question into yes/no, which strips out the nuance that would actually help"

- slug: celtic-cross-tarot-spread
  type: spread
  target_kw: "celtic cross tarot spread"
  tool_path: /tools/tarot-question-generator/
  money_path: /fiverr-tarot-reading/
  related: [/tools/tarot-question-generator/, /fiverr-tarot-reading/, /written-tarot-reading-on-fiverr/]
  spread_data:
    spread_name: "Celtic Cross (10 cards)"
    positions: "1) Heart of the matter — 2) The challenge — 3) Past root — 4) Recent past — 5) Conscious goal — 6) Near future — 7) Your stance — 8) Outside influences — 9) Hopes/fears — 10) Likely direction if nothing changes"
    best_for: "A complex situation you want to see from many angles; not a quick question"
    common_mistake: "Treating position 10 as a fixed fate rather than 'where this trends if you change nothing'"

