# Affiliate redirect map. Each entry generates static/go/<slug>/index.html at build.
# If hugo.toml params.fiverrAffiliateId is set, the redirect uses the real Fiverr
# deep link (go.fiverr.com/visit?bta=...&landingPage=...). Otherwise it falls back
# to the plain target with utm params.
#
# v2: targets are precise Fiverr SEARCH results (query-matched), not bare category
# pages, so soft-placed tool/page links land users on relevant gigs, not a wall of
# thousands. Tools map their result (topic/budget/depth) to the matching slug below.

# --- General hubs (page-level soft links) ---
- slug: fiverr-tarot
  label: Fiverr tarot readers
  target: "https://www.fiverr.com/search/gigs?query=tarot%20reading"
- slug: fiverr-astrology
  label: Fiverr astrology readers
  target: "https://www.fiverr.com/search/gigs?query=astrology%20reading"

# --- Tarot intent (tool-matched) ---
- slug: love-tarot
  label: love & relationship tarot readers
  target: "https://www.fiverr.com/search/gigs?query=love%20tarot%20reading"
- slug: career-tarot
  label: career tarot readers
  target: "https://www.fiverr.com/search/gigs?query=career%20tarot%20reading"
- slug: written-tarot
  label: written tarot report readers
  target: "https://www.fiverr.com/search/gigs?query=written%20tarot%20reading%20report"

# --- Astrology intent (tool-matched) ---
- slug: birth-chart
  label: birth chart readers
  target: "https://www.fiverr.com/search/gigs?query=birth%20chart%20reading"
- slug: compatibility-astrology
  label: compatibility & synastry readers
  target: "https://www.fiverr.com/search/gigs?query=astrology%20compatibility%20synastry%20reading"

# --- Legacy compatibility slugs (avoid 404 on old inbound/crawled links) ---
