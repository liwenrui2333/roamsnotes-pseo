# Affiliate redirect map. Each entry generates static/go/<slug>/index.html at build.
# If hugo.toml params.fiverrAffiliateId is set, the redirect uses the real Fiverr
# deep link (go.fiverr.com/visit?bta=...&landingPage=...). Otherwise it falls back
# to the plain target with utm params.
#
# v3 (2026-06-17): landingPage is now an INDIVIDUAL Fiverr gig (single product),
# not a search results page. `gig:` = the single-product deep-link target;
# `target:` = the query-matched search URL kept as a FALLBACK (build uses gig || target,
# so deleting a dead `gig:` line instantly reverts that slug to the live search page).
#
# Selection criteria (no public per-gig conversion data exists; Fiverr 403s all bots):
#   - deliverable matches the RN page it serves (written report / detailed chart / synastry)
#   - price sits inside the cost-calculator anchor ($10-85), not $5 throwaway or $75+ premium
#   - clear scope, established reviews; NO dramatic outcome claims (compliance red line:
#     no 复合/正缘/发财/治病 predictions)
# Re-verify monthly with: node scripts/check_gigs.js  (+ manual click — 403 != dead).

# --- General hubs (page-level soft links) ---
- slug: fiverr-tarot
  label: Fiverr tarot readers
  gig: "https://www.fiverr.com/bossybusiness/give-you-tarot-card-reading-that-will-blow-your-mind"
  target: "https://www.fiverr.com/search/gigs?query=tarot%20reading"
- slug: fiverr-astrology
  label: Fiverr astrology readers
  gig: "https://www.fiverr.com/astrokatya/an-astrological-birth-chart-reading-an-astrological-synastry-chart-reading"
  target: "https://www.fiverr.com/search/gigs?query=astrology%20reading"

