      body: "Be cautious with gigs promising certain life events on fixed dates, requiring extra payment to 'reveal' your real chart, or asking for sensitive data unrelated to the reading. A natal reading is interpretation and reflection, not a forecast you should act on without your own judgment."
    - heading: "Getting the most from it"
      body: "Tell the reader your focus — general overview, a specific area, or a current question — so the report is not generic. Decide whether you want a re-readable PDF or a personal audio before paying extra. Keep the reading as one perspective among the choices you make yourself."
  faq:
    - q: "What information does a birth chart reading need?"
      a: "Birth date, birth time, and birth location. Birth time sets the rising sign and houses, so a precise reading depends on it; without it, expect a more general overview."
    - q: "How much does a natal chart reading cost on Fiverr?"
      a: "A standard written report is usually $35-$70, with short overviews from $15 and detailed reports up to $90. Delivery is typically 2-5 days."
    - q: "Why are some birth chart readings generic?"
      a: "Thin gigs that skip birth time or your stated focus tend to produce template results. Provide complete data and a clear focus, and pick readers with detailed recent reviews."
