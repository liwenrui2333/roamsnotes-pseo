    - heading: What Cancer sees in Scorpio
      body: >
        **Cancer may feel that Scorpio takes feelings seriously.** That matters.
        The Moon-ruled Cancer side often wants emotional responsiveness,
        home-base loyalty, and proof that vulnerability will not be mocked.


        Scorpio, ruled by Pluto in modern astrology, can look like depth with a
        locked door. Cancer may read that privacy as magnetic at first, then as
        withholding if reassurance is scarce for more than a few days.


        Cancer’s attraction point is clear:


        - Scorpio does not usually treat emotion as “too much.”

        - Scorpio’s fixed modality can make Cancer feel held, not just
        entertained.

        - Scorpio’s loyalty can calm Cancer’s protective instincts.


        The snag is also clear. Cancer may try to nurture their way into
        Scorpio’s inner world, while Scorpio may open only when they choose.
        Care is not a crowbar.
    - heading: What Scorpio sees in Cancer
      body: >
        **Scorpio may trust Cancer because Cancer does not skim the surface.**
        Cancer’s cardinal water moves toward connection, asks what is wrong,
        remembers what mattered last week, and often notices the mood before
        anyone says a word.


        For private Scorpio, that can feel rare. It can also feel exposed. A
        fixed water sign may need time to decide whether closeness is safe,
