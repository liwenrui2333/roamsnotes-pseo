        just speaking different emotional languages.


        The modality helps. Fixed Aquarius can anchor a drifting Pisces idea,
        while mutable Pisces can soften Aquarius when a belief becomes too
        rigid. That is the useful part of fixed vs mutable: one holds shape, the
        other adapts.
