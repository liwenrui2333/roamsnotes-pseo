        2. Keep adventure and consistency on the same calendar. Plan one
        exciting thing and one grounding thing every 7-10 days: a new restaurant
        plus a check-in, a day trip plus a practical conversation, a party plus
        quiet time after.


        This sounds unglamorous. Good. Fire signs often have plenty of glamour;
        the relationship needs a way to keep the flame from becoming smoke.
    - heading: What Sun-Sign Compatibility Cannot Tell You
