        | Area | Score | Why |

        |---|---:|---|

        | Love | 88% | Same water element makes affection feel intuitive;
        Cancer’s cardinal care can meet Scorpio’s fixed loyalty. |

        | Communication | 76% | They sense moods well, but both may imply
