        1. Translate moods into requests.
           - Instead of “you’re shutting me out,” try: “I need to know whether you want space or whether something changed between us.”
           - This helps Cancer stop chasing the fog and helps Scorpio keep privacy without creating panic.

        2. Set a pace agreement.
           - Cancer can name when reassurance is needed: “A check-in tonight would help.”
           - Scorpio can name when depth needs time: “I care, and I need a day before I talk fully.”
           - Cardinal water gets movement; fixed water gets stability.

        Avoid any reader or astrology gig that says “Cancer and Scorpio are
        guaranteed soulmates” or “this person will come back by Friday.” That is
        not astrology. That is pressure dressed up as certainty.
    - heading: The honest boundary
      body: >
        **Sun-sign compatibility is the cover page, not the whole book.** Cancer
        and Scorpio sun signs tell us something useful about element, modality,
        and basic style, but a real synastry reading needs both birth dates,
        exact birth times, and birth places.


        The Moon, Venus, Mars, rising signs, and house overlays can change the
        story. A $25 mini reading may cover the basics; a fuller $60-$120
