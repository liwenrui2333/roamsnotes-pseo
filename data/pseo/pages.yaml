        - Boundaries need to be spoken plainly, especially around alone time,
        friendship, and emotional availability.
    - heading: Two practical ways to make it work
      body: >
        **Do not ask this relationship to survive on vibes.** Give it language,
        timing, and repeatable agreements. Two small practices matter more than
