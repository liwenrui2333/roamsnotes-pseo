        Scorpio’s attraction point tends to be:


        - Cancer’s loyalty feels active, not abstract.

        - Cancer’s Moon-ruled sensitivity can soften Scorpio’s guardedness.

        - Cancer often builds emotional continuity, which Scorpio respects.


        The challenge is pace. Scorpio may want depth on its own terms; Cancer
        may want mutual reassurance now. Neither is wrong, but both can become
