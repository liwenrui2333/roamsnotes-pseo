        dynamics second, and ruler symbolism third. Leo is ruled by the Sun, so
        recognition and heartfelt presence matter; Sagittarius is ruled by
        Jupiter, so growth, candor, and space matter.
    - heading: Why the Attraction Feels Easy
      body: >
        **Leo and Sagittarius usually do not need a translator for basic
        enthusiasm.** Both are fire signs, so excitement, humor, movement, and
        expressive affection are familiar languages.


        Leo may enjoy Sagittarius' candor because it feels alive rather than
        overly managed. Sagittarius may enjoy Leo's warmth because it gives the
        adventure a center, a person, a hearth.


        Strengths to notice:


        - Fast chemistry: both signs often respond to confidence, laughter, and
        shared plans.

        - Visible affection: Leo's warmth and Sagittarius' openness can make
        interest hard to miss.

        - Social momentum: parties, trips, performances, classes, or creative
        projects can feed the bond.

        - Complementary pace: fixed Leo can hold a flame steady while mutable
        Sagittarius brings fresh oxygen.
    - heading: Where It Gets Messy
      body: >
        **The problem is rarely lack of fire. It is what each person thinks fire
        owes them.** Leo may experience love as presence, loyalty, and being
        chosen in a clear way. Sagittarius may experience love as honesty,
        freedom, and room to keep becoming.


        Challenges to watch:


        - Pride versus bluntness: Sagittarius may say the true thing too
        casually; Leo may hear it as disrespect.

        - Loyalty versus mobility: Leo can want consistent reassurance, while
        Sagittarius resists feeling monitored.

        - Drama versus escape: Leo may intensify to be heard; Sagittarius may
        joke, deflect, or leave the room.

        - Big plans, uneven follow-through: fire signs can start fast and
        underestimate maintenance.


        Avoid any reading that says this pair is "guaranteed soulmates" or
        "doomed because Sagittarius cannot commit." That is not astrology; that
        is a shortcut dressed up as certainty.
    - heading: Leo Seeing Sagittarius, Sagittarius Seeing Leo
      body: >
        **Both sides have a point. Neither side gets to be the whole truth.**
        Leo may see Sagittarius as refreshing, brave, funny, and a little
        impossible to pin down. The attraction is obvious, but so is the
        question: "Will you still be here when the room gets quiet?"


        Sagittarius may see Leo as radiant, generous, loyal, and sometimes too
        invested in being acknowledged. The warmth is real, but Sagittarius may
        worry that every honest reaction will become a loyalty test.


        A cleaner question than "Will Leo and Sagittarius last?" is: "Can Leo
        ask for reassurance without controlling, and can Sagittarius ask for
        freedom without disappearing?" That question gives both people something
        they can actually work with.
    - heading: Two Practical Moves
