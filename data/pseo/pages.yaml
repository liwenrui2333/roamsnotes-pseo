        solutions."

        2. Translate distance and sensitivity into requests. "You are too cold"
        becomes "I need a direct reassurance tonight." "You are too intense"
        becomes "I need an hour alone, then I will come back."


        Avoid any reading or gig that says this pair is "destined," "doomed," or
        a guaranteed soulmate match. That is not astrology; it is pressure with
        a mystical costume.
    - heading: The honest boundary
      body: >
        **Sun-sign compatibility is the visible tip, not the whole chart.** A
        real synastry reading looks at both full birth charts: Moon signs,
        Venus, Mars, Mercury, angles, houses, and aspects. Birth time can matter
