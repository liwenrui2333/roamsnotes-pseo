        Strengths:


        - Same water element: feelings are easier to read, even without long
        explanations.

        - Shared loyalty keyword: both tend to value commitment and emotional
        memory.

        - Cardinal plus fixed: Cancer initiates connection; Scorpio sustains it.

        - Moon plus Pluto: tenderness and depth can combine into real intimacy.


        Challenges:


        - Water-water mirroring can amplify moods instead of clarifying them.

        - Cancer may seek reassurance through caretaking; Scorpio may seek
        safety through privacy.

        - Fixed Scorpio can resist emotional pressure; cardinal Cancer can push
        when anxious.

        - Both can remember hurts for a long time, so repair needs to be
