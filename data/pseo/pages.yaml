        faster than most pairs.** Both are water signs, so the bond often starts
        with instinct: tone, silence, memory, and loyalty matter more than
        flashy declarations.


        But water-water can get too smooth. Same element means natural flow, yet
        it can lack friction—the useful kind that helps two people name what
        they want instead of assuming the other person “should just know.”


        The modality difference helps. Cancer is cardinal water, so it tends to
        initiate care, define the emotional climate, and move toward bonding.
        Scorpio is fixed water, so it anchors, deepens, and resists being
