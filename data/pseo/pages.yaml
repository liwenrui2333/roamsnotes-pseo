        softer start before I can stay open."

        2. Set a repair window. If Cancer needs time, name it: "I need 30
        minutes, then I will come back." If Leo needs reassurance, name it: "I
        need to hear that we are still okay."


        That is not magic. It is maintenance. But for water-fire couples,
        maintenance often matters more than chemistry.
    - heading: What sun signs cannot tell you
